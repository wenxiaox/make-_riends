<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>盲盒号码管理后台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "微软雅黑", sans-serif;
        }
        body {
            background: #fff0f4;
            padding: 20px;
        }
        .container {
            max-width: 380px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 22px;
            padding: 25px;
            box-shadow: 0 2px 12px #f1dce4;
        }
        h3 {
            color: #e85080;
            text-align: center;
            margin-bottom: 22px;
            font-size: 20px;
        }
        input, textarea {
            width: 100%;
            border: 1px solid #f0d6e0;
            border-radius: 14px;
            padding: 12px 15px;
            font-size: 15px;
            outline: none;
            margin-bottom: 12px;
            background: #fff9fb;
        }
        textarea {
            height: 120px;
            resize: none;
            line-height: 1.6;
        }
        .btn-flex {
            display: flex;
            gap: 10px;
            margin-bottom: 18px;
        }
        button {
            border: none;
            border-radius: 50px;
            padding: 11px 0;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-batch {
            flex: 1;
            background: #f887ad;
            color: #fff;
        }
        .btn-clear {
            flex: 1;
            background: #eeeeee;
            color: #666;
        }
        .search-box {
            margin: 0 0 15px;
        }
        .title-text {
            font-size: 14px;
            color: #999;
            margin: 10px 0 8px;
        }
        /* 号码列表 下拉滚动容器 */
        .list-wrap {
            max-height: 320px;
            overflow-y: auto;
            padding-right: 4px;
        }
        /* 滚动条美化 */
        .list-wrap::-webkit-scrollbar {
            width: 4px;
        }
        .list-wrap::-webkit-scrollbar-thumb {
            background: #f8c8dc;
            border-radius: 4px;
        }
        .item-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #fef2f7;
            padding: 11px 15px;
            border-radius: 12px;
            margin-bottom: 9px;
            font-size: 15px;
        }
        .del-btn {
            background: #ff597b;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 5px 10px;
            font-size: 13px;
        }
        .empty-tip {
            text-align: center;
            color: #bbb;
            padding: 30px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h3>💗 盲盒号码管理中心</h3>

        <!-- 搜索框 -->
        <div class="search-box">
            <input type="text" id="searchVal" placeholder="🔍 搜索号码" oninput="renderList()">
        </div>

        <!-- 仅保留批量添加 -->
        <textarea id="batchNum" placeholder="批量导入：
每行一个号码
直接粘贴批量内容
自动去重、过滤空行"></textarea>
        <div class="btn-flex">
            <button class="btn-batch" onclick="addBatch()">批量导入</button>
            <button class="btn-clear" onclick="clearAll()">清空全部</button>
        </div>

        <div class="title-text">📋 号码列表（可无限抽取）</div>
        <!-- 滚动下拉列表容器 -->
        <div class="list-wrap" id="listBox"></div>
    </div>

    <script>
        // 获取号码库
        function getList() {
            let data = localStorage.getItem("haoMaKu");
            return data ? JSON.parse(data) : [];
        }
        // 保存号码库
        function saveList(arr) {
            localStorage.setItem("haoMaKu", JSON.stringify(arr));
            renderList();
        }

        // 渲染列表 + 搜索筛选
        function renderList() {
            let list = getList();
            let key = document.getElementById("searchVal").value.trim().toLowerCase();
            let filterList = list.filter(item => item.toLowerCase().includes(key));
            let html = "";

            if (filterList.length === 0) {
                html = '<div class="empty-tip">暂无匹配号码</div>';
            } else {
                filterList.forEach((num, idx) => {
                    html += `
                    <div class="item-card">
                        <span>${num}</span>
                        <button class="del-btn" onclick="delItem(${idx})">删除</button>
                    </div>
                    `;
                });
            }
            document.getElementById("listBox").innerHTML = html;
        }

        // 批量添加 + 自动去重+过滤空行
        function addBatch() {
            let text = document.getElementById("batchNum").value.trim();
            if (!text) return alert("请粘贴号码内容");
            let arr = text.split(/\n/).filter(item => item.trim() !== "");
            let list = getList();
            let count = 0;
            arr.forEach(item => {
                let t = item.trim();
                if (!list.includes(t)) {
                    list.push(t);
                    count++;
                }
            });
            saveList(list);
            document.getElementById("batchNum").value = "";
            alert(`导入完成\n成功新增：${count} 个\n已自动去除重复`);
        }

        // 删除单条号码
        function delItem(index) {
            if (!confirm("确定删除该号码？")) return;
            let list = getList();
            list.splice(index, 1);
            saveList(list);
        }

        // 一键清空全部
        function clearAll() {
            if (!confirm("⚠️ 确定清空所有号码？不可恢复！")) return;
            saveList([]);
        }

        // 关键：页面加载/刷新 自动渲染号码列表
        window.onload = function(){
            renderList();
        };
    </script>
</body>
</html>
