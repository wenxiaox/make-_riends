<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>交友盲盒</title>
    <style>
        body{background:#fff0f4;margin:0;padding:20px;}
        .box{max-width:380px;margin:0 auto;background:#fff;border-radius:20px;padding:30px;text-align:center;}
        h2{color:#e85080;}
        .qr{width:220px;border-radius:12px;margin:20px 0;}
        button{background:#e85080;color:#fff;border:none;padding:12px 25px;border-radius:50px;font-size:16px;cursor:pointer;}
        .res{margin-top:25px;font-size:20px;font-weight:bold;color:#333;}
    </style>
</head>
<body>
    <div class="box">
        <h2>💗交友盲盒</h2>
        <p>扫码付款后抽取编号</p>
        <img src="wx.png" class="qr">
        <p>单次抽取 1元</p>
        <button onclick="draw()">已付款，立即抽号</button>
        <div class="res" id="resText"></div>
    </div>

    <script>
        // 获取号码库（永远不删除）
        function getNumList(){
            let d = localStorage.getItem("haoMaKu");
            return d ? JSON.parse(d) : [];
        }

        // 随机抽号 —— 号码永久保留，可重复抽到
        function draw(){
            let list = getNumList();
            if(list.length <= 0){
                resText.innerText = "暂无号码，请等待补充";
                return;
            }
            // 随机抽，但不删除！
            let r = Math.floor(Math.random() * list.length);
            let num = list[r];
            resText.innerText = "🎉 你的盲盒号码：" + num;
        }
    </script>
</body>
</html>
